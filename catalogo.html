<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Visuals Wear | Catálogo</title><!-- ✅ FIX: era VOIDZONE, agora Trip Visuals -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --text: #fff;
            --cyan: #00e5ff;
            --purple: #9d00ff;
            --glass: rgba(5, 5, 5, 0.85);
            --border: rgba(255,255,255,0.07);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            padding-top: 72px;
        }

        /* ── CUSTOMER HEADER ───────────────────────────── */
        .cust-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 72px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 32px;
            z-index: 9000;
        }

        /* ✅ FIX: Logo agora exibe Trip Visuals, não VOIDZONE */
        .cust-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            line-height: 1;
        }
        .cust-logo img {
            width: 38px; height: 38px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .cust-logo-text {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.4rem;
            letter-spacing: 3px;
            color: var(--text);
        }
        .cust-logo-text span { color: var(--cyan); }

        /* Right side action group */
        .cust-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Search bar */
        .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-input {
            width: 0;
            padding: 0;
            background: transparent;
            border: 1px solid transparent;
            border-radius: 50px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: width 0.35s cubic-bezier(0.4,0,0.2,1),
                        padding 0.35s, border-color 0.35s;
            overflow: hidden;
        }
        .search-input.open {
            width: 200px;
            padding: 8px 16px 8px 38px;
            border-color: var(--border);
            background: rgba(255,255,255,0.05);
        }
        .search-input::placeholder { color: #555; }
        .search-btn {
            position: absolute;
            left: 10px;
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0;
            transition: color 0.2s;
            z-index: 1;
        }
        .search-btn:hover, .search-btn.active { color: var(--cyan); }

        /* Icon buttons */
        .icon-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            color: #aaa;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            flex-shrink: 0;
        }
        .icon-btn:hover {
            border-color: var(--cyan);
            color: var(--cyan);
            box-shadow: 0 0 12px rgba(0,229,255,0.2);
        }
        .icon-btn svg { width: 17px; height: 17px; }

        /* Layout toggle pill */
        .layout-toggle {
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 4px;
            gap: 2px;
        }
        .lt-btn {
            width: 32px; height: 32px;
            border-radius: 50px;
            border: none;
            background: transparent;
            color: #555;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .lt-btn.active {
            background: rgba(0,229,255,0.15);
            color: var(--cyan);
        }
        .lt-btn:hover:not(.active) { color: #aaa; }
        .lt-btn svg { width: 15px; height: 15px; }

        /* Divider */
        .hdr-divider {
            width: 1px; height: 24px;
            background: var(--border);
            flex-shrink: 0;
        }

        /* ── SEARCH RESULTS ────────────────────────────── */
        .search-results {
            position: fixed;
            top: 72px; left: 0; right: 0;
            background: rgba(8,8,8,0.97);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(20px);
            padding: 20px 32px;
            display: none;
            z-index: 8999;
            max-height: 400px;
            overflow-y: auto;
        }
        .search-results.visible { display: block; }
        .sr-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #444;
            margin-bottom: 16px;
        }
        .sr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .sr-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .sr-item:hover { background: rgba(255,255,255,0.05); }
        .sr-item img {
            width: 44px; height: 44px;
            object-fit: cover; border-radius: 6px;
            border: 1px solid #222;
            flex-shrink: 0;
        }
        .sr-item-info { flex: 1; min-width: 0; }
        .sr-item-name {
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .sr-item-price { font-size: 0.75rem; color: var(--cyan); margin-top: 2px; }
        .sr-empty { color: #444; font-size: 0.9rem; padding: 20px 0; }

        /* ── CATALOG GRID ──────────────────────────────── */
        .vitrine-wrap { padding: 32px; }

        .grid-1 { display: flex; flex-direction: column; gap: 20px; max-width: 560px; margin: auto; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 24px; }

        .card-produto {
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.3s, transform 0.3s, box-shadow 0.3s;
            position: relative;
        }
        .card-produto:hover {
            border-color: rgba(0,229,255,0.4);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0,229,255,0.08);
        }
        .card-produto img {
            width: 100%; height: 320px;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s;
        }
        .card-produto:hover img { opacity: 0.75; }

        .buy-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5);
            opacity: 0; transition: opacity 0.3s;
        }
        .card-produto:hover .buy-overlay { opacity: 1; }
        .buy-pill {
            background: var(--cyan);
            color: #000;
            font-weight: 700;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 22px;
            border-radius: 50px;
            transform: translateY(10px);
            transition: transform 0.3s;
        }
        .card-produto:hover .buy-pill { transform: translateY(0); }

        .card-info { padding: 16px 20px; }
        .card-info h3 {
            font-size: 0.85rem;
            font-weight: 500;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .card-info .price {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.3rem;
            color: var(--cyan);
            letter-spacing: 1px;
        }

        /* ── LOADING / EMPTY STATE ─────────────────────── */
        .state-msg {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 40vh;
            color: #333;
            gap: 12px;
        }
        .state-msg .icon { font-size: 2.5rem; }
        .state-msg p     { font-size: 0.9rem; }

        /* ── MOBILE ────────────────────────────────────── */
        @media (max-width: 600px) {
            .cust-header     { padding: 0 16px; }
            .vitrine-wrap    { padding: 16px; }
            .grid-2, .grid-3 { grid-template-columns: 1fr 1fr; gap: 12px; }
            .grid-1          { gap: 12px; }
            .card-produto img { height: 200px; }
            .search-input.open { width: 140px; }
            .sr-grid         { grid-template-columns: 1fr 1fr; }
            .hdr-divider     { display: none; }
            .cust-logo-text  { display: none; } /* só mostra logo img em mobile */
        }
    </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     CUSTOMER HEADER
══════════════════════════════════════════ -->
<header class="cust-header">

    <!-- ✅ FIX: Logo agora é Trip Visuals Wear -->
    <a href="/index.html" class="cust-logo">
        <img src="/logo.jpeg" alt="Trip Visuals Wear"
             onerror="this.style.display='none'">
        <span class="cust-logo-text">TRIP<span>VISUALS</span></span>
    </a>

    <div class="cust-actions">

        <!-- Search -->
        <div class="search-wrap">
            <button class="search-btn" id="searchToggle" onclick="toggleSearch()" title="Buscar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
            </button>
            <input
                class="search-input"
                id="searchInput"
                type="text"
                placeholder="Buscar produto..."
                oninput="filtrarProdutos(this.value)"
                onblur="fecharSearchSeVazio()"
            >
        </div>

        <div class="hdr-divider"></div>

        <!-- Layout Toggle -->
        <div class="layout-toggle" id="layoutToggle">
            <button class="lt-btn" id="lt-grid-3" onclick="setLayout('grid-3')" title="Grade">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <rect x="3"  y="3"  width="7" height="7" rx="1"/>
                    <rect x="14" y="3"  width="7" height="7" rx="1"/>
                    <rect x="3"  y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
            </button>
            <button class="lt-btn" id="lt-grid-2" onclick="setLayout('grid-2')" title="Duo">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <rect x="3"  y="3" width="8" height="18" rx="1"/>
                    <rect x="13" y="3" width="8" height="18" rx="1"/>
                </svg>
            </button>
            <button class="lt-btn" id="lt-grid-1" onclick="setLayout('grid-1')" title="Lista">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <rect x="3" y="4"  width="18" height="4" rx="1"/>
                    <rect x="3" y="10" width="18" height="4" rx="1"/>
                    <rect x="3" y="16" width="18" height="4" rx="1"/>
                </svg>
            </button>
        </div>

        <div class="hdr-divider"></div>

        <!-- Instagram -->
        <a href="https://www.instagram.com/tripvisuals.wear/" target="_blank" class="icon-btn" title="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                <circle cx="12" cy="12" r="4"/>
                <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
            </svg>
        </a>

        <!-- WhatsApp -->
        <a id="whatsappBtn" href="#" target="_blank" class="icon-btn" title="Comprar via WhatsApp"
           style="border-color: rgba(37,211,102,0.3); color: #25d366;">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
        </a>
    </div>
</header>

<!-- Search results dropdown -->
<div class="search-results" id="searchResults"></div>

<!-- ══════════════════════════════════════════
     CATALOG
══════════════════════════════════════════ -->
<div class="vitrine-wrap">
    <main id="vitrine" class="grid-3"></main>
</div>

<script>
    // ✅ FIX: número unificado com index.html — troque pelo número real da loja
    const NUMERO_LOJA = "5511940537169"; // ← NÚMERO DA LOJA

    let todosProdutos = [];
    let searchAberta  = false;

    // ── LAYOUT ───────────────────────────────────────────
    function setLayout(layout) {
        document.getElementById('vitrine').className = layout;
        ['grid-1','grid-2','grid-3'].forEach(l => {
            document.getElementById('lt-' + l).classList.toggle('active', l === layout);
        });
        sessionStorage.setItem('cliente_layout', layout);
    }

    // ── SEARCH ────────────────────────────────────────────
    function toggleSearch() {
        const input = document.getElementById('searchInput');
        const btn   = document.getElementById('searchToggle');
        searchAberta = !searchAberta;
        input.classList.toggle('open', searchAberta);
        btn.classList.toggle('active', searchAberta);
        if (searchAberta) {
            setTimeout(() => input.focus(), 350);
        } else {
            input.value = '';
            fecharResultados();
        }
    }

    function fecharSearchSeVazio() {
        const input = document.getElementById('searchInput');
        if (!input.value.trim()) {
            setTimeout(() => {
                searchAberta = false;
                input.classList.remove('open');
                document.getElementById('searchToggle').classList.remove('active');
                fecharResultados();
            }, 200);
        }
    }

    function fecharResultados() {
        document.getElementById('searchResults').classList.remove('visible');
    }

    function filtrarProdutos(query) {
        const box = document.getElementById('searchResults');
        const q   = query.trim().toLowerCase();
        if (!q) { fecharResultados(); return; }

        const found = todosProdutos.filter(p => p.nome.toLowerCase().includes(q));
        box.classList.add('visible');

        if (found.length === 0) {
            box.innerHTML = `<p class="sr-label">Resultados</p><p class="sr-empty">Nenhum produto encontrado para "${query}"</p>`;
            return;
        }

        box.innerHTML = `
            <p class="sr-label">${found.length} resultado${found.length > 1 ? 's' : ''}</p>
            <div class="sr-grid">
                ${found.map(p => `
                    <div class="sr-item" onclick="comprarItem('${p.nome}', '${p.preco.toFixed(2)}')">
                        <img src="${p.imagem_url}" onerror="this.src='https://via.placeholder.com/44x44/111/333?text=?'">
                        <div class="sr-item-info">
                            <div class="sr-item-name">${p.nome}</div>
                            <div class="sr-item-price">R$ ${p.preco.toFixed(2)}</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-wrap') && !e.target.closest('#searchResults')) {
            fecharResultados();
        }
    });

    // ── COMPRA ────────────────────────────────────────────
    function comprarItem(nome, preco) {
        const texto = `Olá, equipe Trip Visuals! 🛸\n\nVim pelo site e tenho interesse neste artefato:\n*Item:* ${nome}\n*Valor:* R$ ${preco}\n\nPoderiam me ajudar com os tamanhos e o cálculo do frete para o meu CEP?`;
        window.open(`https://wa.me/${NUMERO_LOJA}?text=${encodeURIComponent(texto)}`, '_blank');
    }

    // ── RENDER ────────────────────────────────────────────
    function renderProdutos(lista) {
        const vitrine = document.getElementById('vitrine');
        if (lista.length === 0) {
            vitrine.innerHTML = `
                <div class="state-msg">
                    <span class="icon">👕</span>
                    <p>Nenhum produto disponível no momento.</p>
                </div>`;
            return;
        }
        vitrine.innerHTML = lista.map(p => `
            <div class="card-produto" onclick="comprarItem('${p.nome}', '${p.preco.toFixed(2)}')">
                <img src="${p.imagem_url}" alt="${p.nome}"
                     onerror="this.src='https://via.placeholder.com/400x320/0a0a0a/222?text=SEM+IMAGEM'">
                <div class="buy-overlay">
                    <div class="buy-pill">Adquirir via WhatsApp</div>
                </div>
                <div class="card-info">
                    <h3>${p.nome}</h3>
                    <div class="price">R$ ${p.preco.toFixed(2)}</div>
                </div>
            </div>
        `).join('');
    }

    // ── INIT ──────────────────────────────────────────────
    async function carregar() {
        const vitrine = document.getElementById('vitrine');
        vitrine.innerHTML = `<div class="state-msg"><span class="icon">⏳</span><p>Carregando catálogo...</p></div>`;

        try {
            const resCfg    = await fetch('/api/config');
            const cfg       = await resCfg.json();
            const adminLayout   = cfg.layout_padrao || 'grid-3';
            const sessaoLayout  = sessionStorage.getItem('cliente_layout');
            setLayout(sessaoLayout || adminLayout);
        } catch(e) {
            setLayout('grid-3');
        }

        try {
            const res     = await fetch('/api/produtos');
            todosProdutos = await res.json();
            renderProdutos(todosProdutos);
            document.getElementById('whatsappBtn').href =
                `https://wa.me/${NUMERO_LOJA}?text=${encodeURIComponent('Olá! Vim pelo catálogo Trip Visuals 🛸')}`;
        } catch(e) {
            vitrine.innerHTML = `<div class="state-msg"><span class="icon">⚠️</span><p>Erro ao carregar produtos. Tente novamente.</p></div>`;
        }
    }

    carregar();
</script>
</body>
</html>
