<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catálogo Trip Visuals Wear — Camisetas, regatas e moletons.">
    <title>Trip Visuals Wear | Catálogo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/catalogo.css">
</head>
<body>

<!-- CUSTOMER HEADER -->
<header class="cust-header">
    <a href="/index.html" class="cust-logo" aria-label="Trip Visuals Wear — página inicial">
        <img id="landingLogo" src="/logo.jpeg" alt="">
        <span class="cust-logo-text">TRIP<span>VISUALS</span></span>
    </a>

    <div class="cust-actions">
        <div class="search-wrap">
            <button class="search-btn" id="searchToggle" type="button" aria-label="Buscar produtos" title="Buscar">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
                </svg>
            </button>
            <input class="search-input" id="searchInput" type="text"
                   placeholder="Buscar produto..."
                   aria-label="Buscar produto no catálogo">
        </div>

        <div class="hdr-divider" aria-hidden="true"></div>

        <div class="layout-toggle" role="group" aria-label="Modo de exibição">
            <button class="lt-btn" id="lt-grid-3" type="button" aria-label="Grade — 3 colunas" title="Grade">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <rect x="3"  y="3"  width="7" height="7" rx="1"/>
                    <rect x="14" y="3"  width="7" height="7" rx="1"/>
                    <rect x="3"  y="14" width="7" height="7" rx="1"/>
                    <rect x="14" y="14" width="7" height="7" rx="1"/>
                </svg>
            </button>
            <button class="lt-btn" id="lt-grid-2" type="button" aria-label="Duo — 2 colunas" title="Duo">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <rect x="3"  y="3" width="8" height="18" rx="1"/>
                    <rect x="13" y="3" width="8" height="18" rx="1"/>
                </svg>
            </button>
            <button class="lt-btn" id="lt-grid-1" type="button" aria-label="Lista — 1 coluna" title="Lista">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <rect x="3" y="4"  width="18" height="4" rx="1"/>
                    <rect x="3" y="10" width="18" height="4" rx="1"/>
                    <rect x="3" y="16" width="18" height="4" rx="1"/>
                </svg>
            </button>
        </div>

        <div class="hdr-divider" aria-hidden="true"></div>

        <a href="https://www.instagram.com/tripvisuals.wear/" target="_blank" rel="noopener" class="icon-btn" aria-label="Instagram da Trip Visuals" title="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                <circle cx="12" cy="12" r="4"/>
                <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
            </svg>
        </a>

        <a id="whatsappBtn" href="#" target="_blank" rel="noopener" class="icon-btn"
           aria-label="Falar com a Trip Visuals no WhatsApp" title="Comprar via WhatsApp"
           class="cat-wa-accent">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
        </a>
    </div>
</header>

<div class="search-results" id="searchResults" role="region" aria-live="polite"></div>

<!-- CATALOG -->
<div class="vitrine-wrap">
    <main id="vitrine" class="grid-3" aria-label="Catálogo de produtos"></main>
</div>

<script src="/catalogo.js"></script>

</body>
</html>
