<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOIDZONE | Gerenciar Produtos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin.css">

    <!-- Proteção de rota -->
    <script>
    (async()=>{
        try {
            const r = await fetch('/api/me');
            if (r.status === 401 || r.status === 403) window.location.replace('/login.html');
        } catch(e) {}
    })();
    </script>

    <style>
        .main { padding: 40px; max-width: 1100px; margin: 0 auto; }

        /* Cabeçalho da página */
        .page-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        .produto-count {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            color: var(--cyan);
            letter-spacing: 2px;
            line-height: 1;
        }
        .produto-count-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
        }

        /* Estado de carregamento / vazio */
        .state-msg {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 40vh;
            color: var(--text-muted);
            gap: 12px;
            text-align: center;
        }
        .state-msg .icon { font-size: 2.5rem; }
        .state-msg p     { font-size: 0.9rem; }
        .state-msg a     { color: var(--cyan); text-decoration: none; }
        .state-msg a:hover { text-decoration: underline; }

        /* Grid de produtos */
        .produtos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        /* Card de produto */
        .produto-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .produto-card:hover { border-color: rgba(0,229,255,0.2); }

        .produto-card img {
            width: 100%; height: 200px;
            object-fit: cover; display: block;
            background: #111;
        }

        .produto-card-body { padding: 16px; }

        .produto-fields { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }

        .field-group { display: flex; flex-direction: column; gap: 4px; }
        .field-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
        }

        /* Inputs dentro dos cards */
        .produto-card input[type="text"],
        .produto-card input[type="number"] {
            background: #000;
            border: 1px solid #2a2a2a;
            color: #fff;
            padding: 8px 10px;
            border-radius: 4px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            width: 100%;
        }
        .produto-card input:focus { border-color: var(--cyan); outline: none; }

        /* Linha de ações */
        .produto-actions {
            display: flex; gap: 8px;
        }
        .btn-salvar-item {
            flex: 1;
            background: rgba(0,229,255,0.1);
            border: 1px solid rgba(0,229,255,0.25);
            color: var(--cyan);
            padding: 9px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .btn-salvar-item:hover:not(:disabled) {
            background: rgba(0,229,255,0.18);
            box-shadow: 0 0 12px rgba(0,229,255,0.2);
        }
        .btn-salvar-item:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-remover-item {
            background: rgba(255,60,60,0.08);
            border: 1px solid rgba(255,60,60,0.2);
            color: #ff4d4d;
            padding: 9px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        .btn-remover-item:hover { background: rgba(255,60,60,0.15); }

        /* Indicador de status inline no card */
        .card-status {
            font-size: 0.75rem;
            min-height: 16px;
            margin-bottom: 8px;
            color: var(--cyan);
        }
        .card-status.erro { color: #ff4d4d; }

        @media (max-width: 600px) {
            .main { padding: 20px 16px; }
            .produtos-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <main class="main">
        <div class="page-header-row">
            <div>
                <p class="page-eyebrow">Catálogo</p>
                <h2 class="page-title">GERENCIAR PRODUTOS</h2>
            </div>
            <div style="text-align:right">
                <div class="produto-count" id="totalCount">—</div>
                <div class="produto-count-label">produtos ativos</div>
            </div>
        </div>

        <div id="listaArea">
            <div class="state-msg">
                <span class="icon">⏳</span>
                <p>Carregando produtos...</p>
            </div>
        </div>
    </main>

    <!-- ADMIN BOTTOM NAV -->
    <nav class="admin-nav">
        <a href="/admin-hub.html" class="nav-tab" id="tab-hub">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
            Hub
        </a>
        <a href="/admin.html" class="nav-tab" id="tab-upload">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <polyline points="16 16 12 12 8 16"/>
                <line x1="12" y1="12" x2="12" y2="21"/>
                <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
            Upload
        </a>
        <!-- ✅ active nesta página -->
        <a href="/admin-produtos.html" class="nav-tab active" id="tab-produtos">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <line x1="8" y1="6" x2="21" y2="6"/>
                <line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/>
                <line x1="3" y1="12" x2="3.01" y2="12"/>
                <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            Produtos
        </a>
        <a href="/admin-layout.html" class="nav-tab" id="tab-layout">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="21" x2="9" y2="9"/>
            </svg>
            Layout
        </a>
        <a href="/catalogo.html" class="nav-tab external" id="tab-catalogo" target="_blank">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M1 6s1-1 4-1 5 2 8 2 4-1 4-1V22s-1 1-4 1-5-2-8-2-4 1-4 1V6z"/>
                <line x1="1" y1="6" x2="1" y2="22"/>
            </svg>
            Catálogo
        </a>
    </nav>

    <script>
        let produtos = [];

        function mostrarToast(msg, erro = false) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.background  = erro ? 'rgba(255,60,60,0.12)' : 'rgba(0,229,255,0.12)';
            t.style.borderColor = erro ? 'rgba(255,60,60,0.3)'  : 'rgba(0,229,255,0.3)';
            t.style.color       = erro ? '#ff4d4d' : 'var(--cyan)';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function renderProdutos(lista) {
            const area = document.getElementById('listaArea');
            document.getElementById('totalCount').innerText = lista.length;

            if (lista.length === 0) {
                area.innerHTML = `
                    <div class="state-msg">
                        <span class="icon">📭</span>
                        <p>Nenhum produto cadastrado ainda.</p>
                        <p><a href="/admin.html">Adicionar produtos →</a></p>
                    </div>`;
                return;
            }

            area.innerHTML = `<div class="produtos-grid">${lista.map(p => `
                <div class="produto-card" id="card-${p.id}">
                    <img src="${p.imagem_url}" alt="${p.nome}"
                         onerror="this.src='https://via.placeholder.com/300x200/0a0a0a/222?text=SEM+IMAGEM'">
                    <div class="produto-card-body">
                        <div class="produto-fields">
                            <div class="field-group">
                                <span class="field-label">Nome</span>
                                <input type="text" id="nome-${p.id}" value="${p.nome}">
                            </div>
                            <div class="field-group">
                                <span class="field-label">Preço (R$)</span>
                                <input type="number" id="preco-${p.id}" value="${p.preco.toFixed(2)}" step="0.01" min="0">
                            </div>
                        </div>
                        <p class="card-status" id="st-${p.id}"></p>
                        <div class="produto-actions">
                            <button class="btn-salvar-item" id="btn-${p.id}" onclick="salvar(${p.id})">
                                Salvar
                            </button>
                            <button class="btn-remover-item" onclick="remover(${p.id}, '${p.nome}')">
                                Remover
                            </button>
                        </div>
                    </div>
                </div>
            `).join('')}</div>`;
        }

        async function carregar() {
            try {
                const res = await fetch('/api/produtos');
                if (!res.ok) throw new Error();
                produtos = await res.json();
                renderProdutos(produtos);
            } catch(e) {
                document.getElementById('listaArea').innerHTML = `
                    <div class="state-msg">
                        <span class="icon">⚠️</span>
                        <p>Erro ao carregar produtos. Verifique o servidor.</p>
                    </div>`;
            }
        }

        async function salvar(id) {
            const nome  = document.getElementById(`nome-${id}`).value.trim();
            const preco = parseFloat(document.getElementById(`preco-${id}`).value);
            const st    = document.getElementById(`st-${id}`);
            const btn   = document.getElementById(`btn-${id}`);

            if (!nome || isNaN(preco) || preco < 0) {
                st.innerText = '⚠️ Nome e preço válidos são obrigatórios.';
                st.className = 'card-status erro';
                return;
            }

            btn.disabled  = true;
            btn.innerText = 'Salvando...';
            st.innerText  = '';

            try {
                const res = await fetch(`/api/produtos/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome: nome.toUpperCase(), preco })
                });

                if (res.ok) {
                    st.innerText  = '✅ Salvo com sucesso!';
                    st.className  = 'card-status';
                    mostrarToast('✓ Produto atualizado');
                } else {
                    st.innerText = '❌ Erro ao salvar.';
                    st.className = 'card-status erro';
                }
            } catch(e) {
                st.innerText = '⚠️ Sem conexão com o servidor.';
                st.className = 'card-status erro';
            } finally {
                btn.disabled  = false;
                btn.innerText = 'Salvar';
            }
        }

        async function remover(id, nome) {
            if (!confirm(`Remover o produto "${nome}" permanentemente?\n\nEsta ação não pode ser desfeita.`)) return;

            try {
                const res = await fetch(`/api/produtos/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    // Remove card da UI imediatamente sem reload
                    const card = document.getElementById(`card-${id}`);
                    card.style.transition = 'opacity 0.3s, transform 0.3s';
                    card.style.opacity    = '0';
                    card.style.transform  = 'scale(0.95)';
                    setTimeout(() => {
                        card.remove();
                        produtos = produtos.filter(p => p.id !== id);
                        document.getElementById('totalCount').innerText = produtos.length;
                    }, 300);
                    mostrarToast(`✓ "${nome}" removido`);
                } else {
                    mostrarToast('❌ Erro ao remover produto.', true);
                }
            } catch(e) {
                mostrarToast('⚠️ Sem conexão com o servidor.', true);
            }
        }

        carregar();
    </script>
</body>
</html>
