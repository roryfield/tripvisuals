<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Visuals | Gerenciar Produtos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin.css">

    <!-- ✅ Auth + Theme bootstrap -->
    <script src="/admin-auth-init.js"></script>
</head>
<body>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <datalist id="coresList">
    <option value="Preta">
    <option value="Off-White">
    <option value="Branca">
    <option value="Preto">
    <option value="Azul Royal">
    <option value="Vermelho">
    <option value="Amarelo Ouro">
    <option value="Azul Marinho">
    <option value="Laranja">
    <option value="Verde Musgo">
    <option value="Mescla">
    <option value="Rosa Bebê">
    <option value="Amarelo Mostarda">
    <option value="Azul Claro">
    <option value="Verde Limão">
    <option value="Bege">
    <option value="Vinho">
    <option value="Pink">
    <option value="Verde Bandeira">
    <option value="Amarelo Canário">
    <option value="Azul Turquesa">
    <option value="Roxo">
    <option value="Marrom">
    <option value="Lilás">
    <option value="Azul Petróleo">
    <option value="Chumbo">
    <option value="Caqui">
    <option value="Cinza Claro">
</datalist>

    <main class="main">
        <div class="page-header-row">
            <div>
                <p class="page-eyebrow">Catálogo</p>
                <h2 class="page-title">GERENCIAR PRODUTOS</h2>
            </div>
            <div class="vz-flex-actions">
                <button type="button" class="btn-logout" id="btnLogout" aria-label="Sair">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    <span class="label">Sair</span>
</button>
                <div class="produto-count" id="totalCount">—</div>
                <div class="produto-count-label">produtos ativos</div>
            </div>
        </div>

        <!-- VIEW CONTROLS -->
        <div class="produtos-controls">
            <div class="produtos-search-wrap">
                <svg class="produtos-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                    <circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="produtosSearch" class="produtos-search" placeholder="Buscar por nome ou cor..." autocomplete="off">
            </div>
            <div class="view-toggle" role="group" aria-label="Modo de visualização">
                <button type="button" class="view-toggle-btn active" data-view="grid" aria-label="Visualização em grade" title="Grade">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
                        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
                    </svg>
                </button>
                <button type="button" class="view-toggle-btn" data-view="compact" aria-label="Visualização compacta" title="Lista">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
                        <line x1="8" y1="18" x2="21" y2="18"/>
                        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/>
                        <line x1="3" y1="18" x2="3.01" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>

        <div id="listaArea">
            <div class="state-msg">
                <span class="icon" aria-hidden="true">⏳</span>
                <p>Carregando produtos...</p>
            </div>
        </div>
    </main>

    <!-- ADMIN BOTTOM NAV -->
    <nav class="admin-nav" aria-label="Navegação admin">
        <a href="/admin-hub.html" class="nav-tab" id="tab-hub">

                <rect x="3" y="3" width="7" height="7" rx="1.5"/>
                <rect x="14" y="3" width="7" height="7" rx="1.5"/>
                <rect x="3" y="14" width="7" height="7" rx="1.5"/>
                <rect x="14" y="14" width="7" height="7" rx="1.5"/>
            </svg>
            Hub
        </a>
        <a href="/admin.html" class="nav-tab" id="tab-upload">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <polyline points="16 16 12 12 8 16"/>
                <line x1="12" y1="12" x2="12" y2="21"/>
                <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
            Upload
        </a>
        <a href="/admin-produtos.html" class="nav-tab active" id="tab-produtos" aria-current="page">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <line x1="8" y1="6" x2="21" y2="6"/>
                <line x1="8" y1="12" x2="21" y2="12"/>
                <line x1="8" y1="18" x2="21" y2="18"/>
                <line x1="3" y1="6" x2="3.01" y2="6"/>
                <line x1="3" y1="12" x2="3.01" y2="12"/>
                <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
            Produtos
        </a>
        <a href="/admin-layout.html" class="nav-tab" id="tab-layout">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <line x1="3" y1="9" x2="21" y2="9"/>
                <line x1="9" y1="21" x2="9" y2="9"/>
            </svg>
            Layout
        </a>
        <a href="/admin-landing.html" class="nav-tab" id="tab-landing">
    <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <rect x="2" y="4" width="20" height="14" rx="2"/>
        <line x1="2" y1="9" x2="22" y2="9"/>
        <line x1="8" y1="22" x2="16" y2="22"/>
        <line x1="12" y1="18" x2="12" y2="22"/>
    </svg>
    Landing Page
</a>
                <a href="/catalogo.html" class="nav-tab external" id="tab-catalogo" target="_blank" rel="noopener">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
                <path d="M1 6s1-1 4-1 5 2 8 2 4-1 4-1V22s-1 1-4 1-5-2-8-2-4 1-4 1V6z"/>
                <line x1="1" y1="6" x2="1" y2="22"/>
            </svg>
            Catálogo
        </a>
    </nav>

    <script src="/admin-produtos.js"></script>


<script src="/admin-shared.js"></script>
</body>
</html>
