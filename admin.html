<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Visuals | Upload de Produtos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin.css">

    <!-- ✅ Auth + Theme bootstrap -->
    <script>
    document.documentElement.dataset.init = 'pending';
    (async () => {
        try {
            const [me, cfg] = await Promise.all([fetch('/api/me'), fetch('/api/config')]);
            if (me.status === 401 || me.status === 403) { window.location.replace('/login.html'); return; }
            if (cfg.ok) {
                const data = await cfg.json();
                if (data.tema_admin === 'claro') document.documentElement.classList.add('apply-light');
            }
        } catch (e) { console.warn('Init bootstrap:', e.message); }
        finally {
            if (document.documentElement.classList.contains('apply-light') && document.body) {
                document.body.classList.add('tema-claro');
            }
            document.documentElement.removeAttribute('data-init');
        }
    })();
    </script>
    <noscript><style>html[data-init] body { visibility: visible !important; }</style></noscript>

    <style>
        .main {
            padding: 40px;
            max-width: 960px;
            margin: 0 auto;
        }
        .upload-help {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 8px;
            text-align: center;
        }
        @media (max-width: 600px) {
            .main { padding: 20px 16px; }
        }
    </style>
</head>
<body>

<main class="main">

    <div class="page-header">
        <div>
            <p class="page-eyebrow">Gestão de Produtos</p>
            <h2 class="page-title">UPLOAD DE PRODUTOS</h2>
        </div>
    </div>

    <!-- Drop zone -->
    <div class="dropzone" onclick="document.getElementById('fileInput').click()"
         onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();document.getElementById('fileInput').click()}"
         role="button" tabindex="0" aria-label="Selecionar imagens de produtos">
        <h3>+ ADICIONAR PRODUTOS</h3>
        <p>Clique para selecionar imagens — nomenclatura e precificação automáticas</p>
        <p class="upload-help">JPG, PNG, WEBP ou GIF · máx. 10MB por imagem</p>
        <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/webp,image/gif" style="display:none">
    </div>

    <!-- Revisão — exibida após seleção de imagens -->
    <div id="revisao" style="display:none">
        <table class="vz-table">
            <thead>
                <tr>
                    <th style="width:70px">Foto</th>
                    <th>Tipo</th>
                    <th>Estampa / Nome</th>
                    <th>Cor</th>
                    <th>Preço (R$)</th>
                    <th class="status-cell">Status</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>

        <button id="btnLancar" class="btn-launch btn-launch-full" onclick="enviarTudo()">
            Lançar no Abismo
        </button>
    </div>

</main>

<!-- ADMIN BOTTOM NAV -->

            <polyline points="16 16 12 12 8 16"/>

<script>
    const PRECOS    = { "Camiseta": 99.90, "Regata": 89.90, "Moletom": 129.90 };
    const MAX_BYTES = 10 * 1024 * 1024;                       // 10MB — matches server multer limit
    const ALLOWED   = ['image/jpeg','image/png','image/webp','image/gif'];

    // Simple HTML escape to prevent XSS from filenames in display
    const escapeHTML = s => String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));

    let filaFiles = [];

    document.getElementById('fileInput').onchange = (e) => {
        const escolhidos = Array.from(e.target.files);
        if (escolhidos.length === 0) return;

        // ✅ Filter invalid files client-side
        const validos    = [];
        const rejeitados = [];
        for (const f of escolhidos) {
            if (!ALLOWED.includes(f.type)) {
                rejeitados.push(`${f.name}: tipo não permitido`);
            } else if (f.size > MAX_BYTES) {
                rejeitados.push(`${f.name}: maior que 10MB`);
            } else {
                validos.push(f);
            }
        }
        if (rejeitados.length) {
            alert('Os seguintes arquivos foram ignorados:\n\n' + rejeitados.join('\n'));
        }
        if (validos.length === 0) {
            e.target.value = '';
            return;
        }

        filaFiles = validos;
        document.getElementById('revisao').style.display = 'block';
        const lista = document.getElementById('lista');
        lista.innerHTML = '';

        filaFiles.forEach((file, i) => {
            const nomeRaw     = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            const nomeDisplay = escapeHTML(nomeRaw.toUpperCase()
                .replace(/[-_]/g, ' ')
                .replace(/whatsapp image/gi, '')
                .trim());

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><img src="${URL.createObjectURL(file)}" alt="Pré-visualização do produto"></td>
                <td>
                    <select id="t-${i}" aria-label="Tipo de produto" onchange="document.getElementById('p-${i}').value = PRECOS[this.value].toFixed(2)">
                        <option value="Camiseta">Camiseta</option>
                        <option value="Regata">Regata</option>
                        <option value="Moletom">Moletom</option>
                    </select>
                </td>
                <td><input type="text" id="e-${i}" value="${nomeDisplay}" aria-label="Nome ou estampa"></td>
                <td>
                    <select id="c-${i}" aria-label="Cor">
                        <option value="Preta">Preta</option>
                        <option value="Branca">Branca</option>
                    </select>
                </td>
                <td><input type="number" id="p-${i}" value="99.90" step="0.01" min="0" max="999999" style="max-width:100px" aria-label="Preço em reais"></td>
                <td class="status-cell" id="status-${i}">—</td>
            `;
            lista.appendChild(tr);
        });
    };

    async function enviarTudo() {
        if (filaFiles.length === 0) return;
        if (!confirm(`Confirmar envio de ${filaFiles.length} produto(s)?`)) return;

        const btn = document.getElementById('btnLancar');
        btn.disabled  = true;
        btn.innerText = 'ENVIANDO...';

        let sucesso = 0, falha = 0;

        for (let i = 0; i < filaFiles.length; i++) {
            const status = document.getElementById(`status-${i}`);
            status.innerText = '⏳';

            const tipo      = document.getElementById(`t-${i}`).value;
            const estampa   = document.getElementById(`e-${i}`).value.trim();
            const cor       = document.getElementById(`c-${i}`).value;
            const preco     = document.getElementById(`p-${i}`).value;
            const nomeFinal = `${tipo} ${estampa} ${cor}`.toUpperCase().trim();

            if (!estampa) {
                status.innerText = '⚠️';
                falha++;
                continue;
            }

            const fd = new FormData();
            fd.append('imagem', filaFiles[i]);
            fd.append('nome',   nomeFinal);
            fd.append('preco',  preco);

            try {
                const res = await fetch('/api/produtos', { method: 'POST', body: fd });
                if (res.ok) { status.innerText = '✅'; sucesso++; }
                else        { status.innerText = '❌'; falha++; console.error(`Item ${i}:`, await res.text()); }
            } catch (e) {
                status.innerText = '⚠️';
                falha++;
                console.error(`Rede item ${i}:`, e);
            }
        }

        btn.innerText = `${sucesso} ✅  ${falha ? falha + ' ❌' : ''} — REDIRECIONANDO...`;
        setTimeout(() => window.location.href = '/admin-hub.html', 2000);
    }
</script>
</body>
</html>
