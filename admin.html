<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOIDZONE | Upload de Produtos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin.css">

    <!-- Proteção de rota -->
    <script>
    (async()=>{
        try {
            const r = await fetch('/api/me');
            if (r.status === 401 || r.status === 403) window.location.replace('/login.html');
        } catch(e) {}
    })();
    </script>

    <style>
        /* ✅ Layout de página inteira — sidebar removida */
        .main {
            padding: 40px;
            max-width: 960px;
            margin: 0 auto;
        }

        @media (max-width: 600px) {
            .main { padding: 20px 16px; }
        }
    </style>
</head>
<body>

<!-- ✅ REDESIGN: sidebar completamente removida -->
<main class="main">

    <!-- Page Header — igual ao padrão do sistema -->
    <div class="page-header">
        <div>
            <p class="page-eyebrow">Gestão de Produtos</p>
            <h2 class="page-title">UPLOAD DE PRODUTOS</h2>
        </div>
    </div>

    <!-- Drop zone -->
    <div class="dropzone" onclick="document.getElementById('fileInput').click()">
        <h3>+ ADICIONAR PRODUTOS</h3>
        <p>Clique para selecionar imagens — nomenclatura e precificação automáticas</p>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
    </div>

    <!-- Revisão — exibida após seleção de imagens -->
    <div id="revisao" style="display:none">
        <table class="vz-table">
            <thead>
                <tr>
                    <th style="width:70px">Foto</th>
                    <th>Tipo</th>
                    <th>Estampa / Nome</th>
                    <th>Cor</th>
                    <th>Preço (R$)</th>
                    <th class="status-cell">Status</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>

        <button id="btnLancar" class="btn-launch btn-launch-full" onclick="enviarTudo()">
            Lançar no Abismo
        </button>
    </div>

</main>

<!-- ══════════════════════════════════════════
     ADMIN BOTTOM NAV
══════════════════════════════════════════ -->
<nav class="admin-nav">
    <a href="/admin-hub.html" class="nav-tab" id="tab-hub">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/>
            <rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
        Hub
    </a>
    <!-- ✅ active nesta página -->
    <a href="/admin.html" class="nav-tab active" id="tab-upload">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polyline points="16 16 12 12 8 16"/>
            <line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>
        Upload
    </a>
    <a href="/admin-produtos.html" class="nav-tab" id="tab-produtos">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>
        Produtos
    </a>
    <a href="/admin-layout.html" class="nav-tab" id="tab-layout">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/>
            <line x1="9" y1="21" x2="9" y2="9"/>
        </svg>
        Layout
    </a>
    <a href="/catalogo.html" class="nav-tab external" id="tab-catalogo" target="_blank">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M1 6s1-1 4-1 5 2 8 2 4-1 4-1V22s-1 1-4 1-5-2-8-2-4 1-4 1V6z"/>
            <line x1="1" y1="6" x2="1" y2="22"/>
        </svg>
        Catálogo
    </a>
</nav>

<script>
    // ✅ Precificação automática por tipo (mantida do admin.html original)
    const PRECOS = { "Camiseta": 99.90, "Regata": 89.90, "Moletom": 129.90 };

    let filaFiles = [];

    document.getElementById('fileInput').onchange = (e) => {
        filaFiles = Array.from(e.target.files);
        if (filaFiles.length === 0) return;

        document.getElementById('revisao').style.display = 'block';
        const lista = document.getElementById('lista');
        lista.innerHTML = '';

        filaFiles.forEach((file, i) => {
            // Limpa o nome do arquivo para exibição
            const nomeRaw   = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
            const nomeDisplay = nomeRaw.toUpperCase()
                .replace(/[-_]/g, ' ')
                .replace(/whatsapp image/gi, '')
                .trim();

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><img src="${URL.createObjectURL(file)}" alt="preview"></td>
                <td>
                    <!-- ✅ onchange atualiza preço automaticamente ao trocar tipo -->
                    <select id="t-${i}" onchange="document.getElementById('p-${i}').value = PRECOS[this.value].toFixed(2)">
                        <option value="Camiseta">Camiseta</option>
                        <option value="Regata">Regata</option>
                        <option value="Moletom">Moletom</option>
                    </select>
                </td>
                <td><input type="text" id="e-${i}" value="${nomeDisplay}"></td>
                <td>
                    <select id="c-${i}">
                        <option value="Preta">Preta</option>
                        <option value="Branca">Branca</option>
                    </select>
                </td>
                <td><input type="number" id="p-${i}" value="99.90" step="0.01" min="0" style="max-width:100px"></td>
                <td class="status-cell" id="status-${i}">—</td>
            `;
            lista.appendChild(tr);
        });
    };

    async function enviarTudo() {
        if (!confirm(`Confirmar envio de ${filaFiles.length} produto(s)?`)) return;

        const btn = document.getElementById('btnLancar');
        btn.disabled  = true;
        btn.innerText = 'ENVIANDO...';

        for (let i = 0; i < filaFiles.length; i++) {
            const status = document.getElementById(`status-${i}`);
            status.innerText = '⏳';

            const tipo      = document.getElementById(`t-${i}`).value;
            const estampa   = document.getElementById(`e-${i}`).value;
            const cor       = document.getElementById(`c-${i}`).value;
            const nomeFinal = `${tipo} ${estampa} ${cor}`.toUpperCase();
            const preco     = document.getElementById(`p-${i}`).value;

            const fd = new FormData();
            fd.append('imagem', filaFiles[i]);
            fd.append('nome',   nomeFinal);
            fd.append('preco',  preco);

            try {
                const res = await fetch('/api/produtos', { method: 'POST', body: fd });
                status.innerText = res.ok ? '✅' : '❌';
                if (!res.ok) console.error(`Erro item ${i}:`, await res.text());
            } catch(e) {
                status.innerText = '⚠️';
                console.error(`Rede item ${i}:`, e);
            }
        }

        btn.innerText = '✅ FINALIZADO — REDIRECIONANDO...';
        setTimeout(() => window.location.href = '/admin-hub.html', 1800);
    }
</script>
</body>
</html>
