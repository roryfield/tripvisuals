<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Visuals | Upload de Produtos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin.css">
    <script src="/admin-auth-init.js"></script>
</head>
<body>

<main class="main">

    <div class="page-header vz-page-hdr-flex">
        <div>
            <p class="page-eyebrow">Gestão de Produtos</p>
            <h2 class="page-title">UPLOAD DE PRODUTOS</h2>
        </div>
        <button type="button" class="btn-logout" id="btnLogout" aria-label="Sair">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            <span class="label">Sair</span>
        </button>
    </div>

    <!-- Drop zone -->
    <div class="dropzone" id="dropzone" role="button" tabindex="0" aria-label="Selecionar imagens de produtos">
        <h3>+ ADICIONAR PRODUTOS</h3>
        <p>Clique para selecionar imagens</p>
        <p class="upload-help">JPG · PNG · WEBP · GIF &nbsp;·&nbsp; máx. 10MB por arquivo &nbsp;·&nbsp; máx. 50 por vez</p>
    </div>
    <!-- fileInput outside dropzone — prevents click bubbling loop -->
    <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/webp,image/gif" hidden>

    <!-- Batch panel — shown after file selection -->
    <div id="batchPanel" hidden>

        <!-- Batch config -->
        <div class="batch-cfg">
            <div class="batch-field">
                <label class="batch-label" for="batchTipo">Tipo padrão</label>
                <select id="batchTipo" class="batch-select">
                    <option value="Camiseta">Camiseta</option>
                    <option value="Regata">Regata</option>
                    <option value="Moletom">Moletom</option>
                </select>
            </div>
            <div class="batch-field">
                <label class="batch-label" for="batchCor">Cor padrão</label>
                <select id="batchCor" class="batch-select">
                    <option value="Preta">Preta</option>
                    <option value="Branca">Branca</option>
                </select>
            </div>
            <div class="batch-field">
                <label class="batch-label" for="batchPreco">Preço padrão (R$)</label>
                <input id="batchPreco" class="batch-input" type="number"
                       value="99.90" step="0.01" min="0" max="999999">
            </div>
        </div>

        <!-- Collection name for unnamed files (WhatsApp etc.) -->
        <div class="batch-colecao">
            <label class="batch-label" for="batchColecao">
                Coleção
                <span class="batch-label-hint">— nome para arquivos sem identificação (fotos do WhatsApp, câmera, etc.)</span>
            </label>
            <input id="batchColecao" class="batch-input batch-input-wide" type="text"
                   placeholder="Ex: PANTERA — vira CAMISETA PANTERA 1 PRETA, 2, 3...">
            <p class="batch-preview" id="batchPreview"></p>
        </div>

        <!-- Summary + launch -->
        <div class="batch-footer">
            <p class="batch-summary" id="batchSummary"></p>
            <button id="btnLancar" type="button" class="btn-launch btn-launch-full">
                LANÇAR PRODUTOS
            </button>
        </div>

        <!-- Collapsible review table -->
        <details class="batch-details" id="revisaoDetails">
            <summary class="batch-details-toggle">Revisar arquivos individualmente</summary>
            <table class="vz-table">
                <thead>
                    <tr>
                        <th class="vz-w-70">Foto</th>
                        <th>Tipo</th>
                        <th>Estampa / Nome</th>
                        <th>Cor</th>
                        <th>Preço (R$)</th>
                        <th class="status-cell">Status</th>
                    </tr>
                </thead>
                <tbody id="lista"></tbody>
            </table>
        </details>

    </div><!-- /batchPanel -->

</main>

<nav class="admin-nav" aria-label="Navegação admin">
    <a href="/admin-hub.html" class="nav-tab" id="tab-hub">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
            <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>Hub
    </a>
    <a href="/admin.html" class="nav-tab active" id="tab-upload" aria-current="page">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <polyline points="16 16 12 12 8 16"/><line x1="12" y1="12" x2="12" y2="21"/>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
        </svg>Upload
    </a>
    <a href="/admin-produtos.html" class="nav-tab" id="tab-produtos">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
        </svg>Produtos
    </a>
    <a href="/admin-layout.html" class="nav-tab" id="tab-layout">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/>
        </svg>Layout
    </a>
    <a href="/admin-landing.html" class="nav-tab" id="tab-landing">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <rect x="2" y="4" width="20" height="14" rx="2"/>
            <line x1="2" y1="9" x2="22" y2="9"/><line x1="8" y1="22" x2="16" y2="22"/>
            <line x1="12" y1="18" x2="12" y2="22"/>
        </svg>Landing Page
    </a>
    <a href="/catalogo.html" class="nav-tab external" id="tab-catalogo" target="_blank" rel="noopener">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
            <path d="M1 6s1-1 4-1 5 2 8 2 4-1 4-1V22s-1 1-4 1-5-2-8-2-4 1-4 1V6z"/>
            <line x1="1" y1="6" x2="1" y2="22"/>
        </svg>Catálogo
    </a>
</nav>

<script src="/admin-upload.js"></script>
<script src="/admin-shared.js"></script>
</body>
</html>
