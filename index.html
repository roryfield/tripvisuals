<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trip Visuals Wear | Links</title>
  <meta name="description" content="Trip Visuals Wear — moda imersiva. Catálogo, Instagram e WhatsApp da loja.">
  <meta name="theme-color" content="#050505">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Trip Visuals Wear">
  <meta property="og:description" content="Fluxo Imersivo · Catálogo, Instagram e WhatsApp.">
  <meta property="og:image" content="/logo.jpeg">

  <link rel="icon" type="image/jpeg" href="/logo.jpeg">

  <!-- Fonts: Inter for body, Oswald for header logo (matches style.css) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Oswald:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Base landing styles -->
  <link rel="stylesheet" href="/style.css">

  <style>
    /* Layout shell & content polish that supplements style.css */
    .landing-container {
      max-width: 460px;
      margin: 0 auto;
      padding: 20px;
    }
    .logo-glow {
      width: 150px;
      height: 150px;
      object-fit: cover;
    }
    .landing-title {
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .landing-subtitle {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-size: 0.85rem;
    }
    .neon-btn:focus-visible {
      outline: 2px solid var(--neon-cyan);
      outline-offset: 4px;
    }
    .main-header .logo { text-decoration: none; }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <header class="main-header">
    <a href="/" class="logo">TRIPVISUALS<span>·WEAR</span></a>
  </header>

  <main class="landing-container">

    <img id="landingLogo" class="logo-glow" src="/logo.jpeg" alt="Logo da Trip Visuals Wear">

    <h1 id="landingTitle" class="landing-title">TRIP VISUALS WEAR</h1>
    <h2 id="landingTagline" class="landing-subtitle">Fluxo Imersivo</h2>

    <nav class="links-section" aria-label="Links principais">
      <a class="neon-btn" href="/catalogo.html">Catálogo</a>
      <a id="landingInstagram" class="neon-btn" href="https://www.instagram.com/tripvisuals.wear/" target="_blank" rel="noopener">Siga no Instagram</a>
      <a id="landingWhatsapp"  class="neon-btn" href="https://wa.me/5511940537169" target="_blank" rel="noopener">Fale Conosco</a>
    </nav>

    <p id="landingFooter" class="footer-credits">By Rory 💀</p>

  </main>

  <!-- [VZ] Dynamic content loader. Reads admin overrides from /api/config.
       Silently falls back to the static HTML defaults above if anything fails. -->
  <script>
  (function () {
    fetch('/api/config')
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (cfg) {
        if (!cfg) return;
        var set = function (id, prop, val) {
          if (val == null || val === '') return;
          var el = document.getElementById(id);
          if (el) el[prop] = val;
        };
        set('landingLogo',      'src',         cfg.landing_logo_url);
        set('landingTitle',     'textContent', cfg.landing_title);
        set('landingTagline',   'textContent', cfg.landing_tagline);
        set('landingInstagram', 'href',        cfg.landing_instagram);
        set('landingWhatsapp',  'href',        cfg.landing_whatsapp);
        set('landingFooter',    'textContent', cfg.landing_footer);

        var body = document.body;
        if (cfg.landing_bg_color && /^#[0-9a-fA-F]{6}$/.test(cfg.landing_bg_color)) {
          body.style.backgroundColor = cfg.landing_bg_color;
        }
        if (cfg.landing_bg_image_url) {
          body.style.backgroundImage      = 'url(' + cfg.landing_bg_image_url + ')';
          body.style.backgroundSize       = 'cover';
          body.style.backgroundPosition   = 'center';
          body.style.backgroundAttachment = 'fixed';
          body.style.backgroundRepeat     = 'no-repeat';
        }
      })
      .catch(function () {});
  })();
  </script>

</body>
</html>
