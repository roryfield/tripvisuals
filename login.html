<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Visuals | Acesso Restrito</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/login.css">
</head>
<body>

    <main class="login-card" id="loginBox">
        <h1 class="login-brand">TRIP VISUALS</h1>
        <p class="login-sub">Acesso Restrito · Painel Admin</p>

        <div class="input-wrap">
            <label for="senha" class="visually-hidden vz-sr-only">Chave de acesso</label>
            <input type="password" id="senha" placeholder="Chave de acesso"
                   autocomplete="current-password" autofocus
                   onkeydown="if(event.key==='Enter') fazerLogin()">
        </div>

        <p class="erro-msg" id="erroMsg" role="alert" aria-live="assertive"></p>

        <button class="btn-auth" id="btnAuth" onclick="fazerLogin()">AUTENTICAR</button>
    </main>

    <div class="loading-screen" id="loadScreen" aria-hidden="true">
        <div class="void-loader"></div>
        <p class="vz-muted-label">
            Estabelecendo conexão...
        </p>
    </div>

    <script src="/login.js"></script>
</body>
</html>
