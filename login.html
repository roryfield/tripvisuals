<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito — VOIDZONE</title>
    <style>
        :root { --cyan: #00e5ff; --purple: #9d00ff; --dark: #050505; }

        body {
            background: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .login-card {
            background: #0c0c0c;
            padding: 50px 40px;
            border: 1px solid var(--purple);
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.2);
            text-align: center;
            transition: opacity 0.5s ease;
            width: 320px;
        }

        .login-title {
            color: var(--cyan);
            letter-spacing: 3px;
            margin-top: 0;
            margin-bottom: 4px;
            font-size: 1.5rem;
        }
        .login-sub {
            font-size: 0.7rem;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-wrap { position: relative; margin: 20px 0 8px; }
        input {
            background: #111;
            border: 1px solid #333;
            color: white;
            padding: 15px;
            width: 100%;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus { border-color: var(--cyan); outline: none; }

        /* ✅ NOVO: Mensagem de erro inline — sem alert() */
        .erro-msg {
            font-size: 0.78rem;
            color: #ff4d4d;
            min-height: 18px;
            margin-bottom: 14px;
            letter-spacing: 0.3px;
            transition: opacity 0.2s;
        }

        .btn-auth {
            background: #fff;
            color: #000;
            font-weight: bold;
            padding: 15px;
            width: 100%;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            transition: background 0.3s, opacity 0.3s;
        }
        .btn-auth:hover:not(:disabled) { background: var(--cyan); }
        .btn-auth:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Loading screen */
        .loading-screen {
            position: absolute; inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .loading-screen.active { opacity: 1; pointer-events: all; }

        .void-loader {
            width: 50px; height: 50px;
            border: 2px solid transparent;
            border-top-color: var(--cyan);
            border-bottom-color: var(--purple);
            border-radius: 50%;
            animation: void-spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
            margin-bottom: 20px;
        }
        @keyframes void-spin {
            0%   { transform: rotate(0deg);   opacity: 0.5; }
            50%  { transform: rotate(180deg); opacity: 1; box-shadow: 0 0 15px var(--cyan); }
            100% { transform: rotate(360deg); opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="login-card" id="loginBox">
        <h2 class="login-title">VOIDZONE</h2>
        <p class="login-sub">Acesso Restrito · Trip Visuals</p>

        <div class="input-wrap">
            <!-- ✅ NOVO: Enter dispara o login -->
            <input type="password" id="senha" placeholder="Chave de acesso"
                   onkeydown="if(event.key==='Enter') fazerLogin()">
        </div>

        <!-- ✅ NOVO: Erro inline, sem alert() -->
        <p class="erro-msg" id="erroMsg"></p>

        <button class="btn-auth" id="btnAuth" onclick="fazerLogin()">AUTENTICAR</button>
    </div>

    <div class="loading-screen" id="loadScreen">
        <div class="void-loader"></div>
        <p style="color: #666; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase;">
            Estabelecendo conexão...
        </p>
    </div>

    <script>
        async function fazerLogin() {
            const senha   = document.getElementById('senha').value.trim();
            const erroMsg = document.getElementById('erroMsg');
            const btn     = document.getElementById('btnAuth');

            if (!senha) {
                erroMsg.innerText = 'Digite a chave de acesso.';
                document.getElementById('senha').focus();
                return;
            }

            erroMsg.innerText = '';
            btn.disabled      = true;
            btn.innerText     = 'VERIFICANDO...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ senha })
                });

                if (res.ok) {
                    // Sucesso — anima entrada no admin
                    document.getElementById('loginBox').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loadScreen').classList.add('active');
                        setTimeout(() => window.location.href = '/admin-hub.html', 2500);
                    }, 400);
                } else {
                    // ✅ NOVO: erro inline, sem alert
                    erroMsg.innerText = 'Acesso negado. Tente novamente.';
                    document.getElementById('senha').value = '';
                    document.getElementById('senha').focus();
                    btn.disabled  = false;
                    btn.innerText = 'AUTENTICAR';

                    // Shake visual na card
                    const card = document.getElementById('loginBox');
                    card.style.animation = 'none';
                    card.offsetHeight; // reflow
                    card.style.animation = 'shake 0.4s ease';
                }
            } catch (e) {
                erroMsg.innerText = 'Erro de conexão com o servidor.';
                btn.disabled  = false;
                btn.innerText = 'AUTENTICAR';
            }
        }

        /* Animação de shake no erro */
        const style = document.createElement('style');
        style.innerText = `@keyframes shake {
            0%,100%{transform:translateX(0)}
            20%{transform:translateX(-8px)}
            40%{transform:translateX(8px)}
            60%{transform:translateX(-5px)}
            80%{transform:translateX(5px)}
        }`;
        document.head.appendChild(style);
    </script>
</body>
</html>
